<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jadwal Pelajaran Al-Wildan</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header-section">
    <div class="header-main-wrapper">
      
     <div class="header-top-content">
  <img src="logo-sekolah.png" alt="Logo" class="header-logo">
  <div>
    <h1>JADWAL PELAJARAN</h1>
    <div class="mobile-subtext">
      AL-WILDAN<br>
      ISLAMIC SCHOOL 3 BSD CITY
    </div>
  </div>
</div>

      <div class="header-bottom-row">
        
        <div class="tab-container">
          <button id="btnTabUmum" class="tab-btn active" onclick="switchTab('umum')">Jadwal Umum</button>
          <button id="btnTabTematik" class="tab-btn" onclick="switchTab('tematik')">Jadwal Tematik</button>
        </div>

        <div id="controlsUmum" class="header-controls">
          <div class="input-wrapper search-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M10 2a8 8 0 0 1 6.32 12.9l4.39 4.39a1 1 0 0 1-1.42 1.42l-4.39-4.39A8 8 0 1 1 10 2zm0 2a6 6 0 1 0 0 12 6 6 0 0 0 0-12z"/></svg>
            <input type="text" id="searchInput" placeholder="Ketik nama atau kelas..." onkeyup="handleSearch();" oninput="updatePrintOwner('umum')">
            <button class="clear-btn" id="clearBtn" onclick="clearSearch(); updatePrintOwner('umum');" title="Hapus pencarian">
              <svg viewBox="0 0 24 24"><path d="M12 10.586l4.95-4.95a1 1 0 1 1 1.414 1.414l-4.95 4.95 4.95 4.95a1 1 0 0 1-1.414 1.414l-4.95-4.95-4.95 4.95a1 1 0 0 1-1.414-1.414l4.95-4.95-4.95-4.95a1 1 0 0 1 1.414-1.414l4.95 4.95z"/></svg>
            </button>
          </div>
          
          <div id="jpCounter" class="jp-counter-box"></div> 
          
          <button class="btn-pdf" onclick="cetakPDF('umum')">
            <svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6V2zm2 2v16h10V8.414L14.586 4H8zm6 1.5V9h3.5L14 5.5zM8 12h8v2H8v-2zm0 4h8v2H8v-2z"/></svg>
            Cetak PDF
          </button>
        </div>

        <div id="controlsTematik" class="header-controls" style="display: none;">
          <div class="input-wrapper search-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M10 2a8 8 0 0 1 6.32 12.9l4.39 4.39a1 1 0 0 1-1.42 1.42l-4.39-4.39A8 8 0 1 1 10 2zm0 2a6 6 0 1 0 0 12 6 6 0 0 0 0-12z"/></svg>
            <input type="text" id="searchTematikInput" placeholder="Ketik nama atau kelas..." onkeyup="if(typeof handleTematikGridFilter === 'function') handleTematikGridFilter();" oninput="updatePrintOwner('tematik')">
            <button class="clear-btn" id="clearTematikBtn" onclick="if(typeof clearTematikSearch === 'function') clearTematikSearch(); updatePrintOwner('tematik');" title="Hapus pencarian">
              <svg viewBox="0 0 24 24"><path d="M12 10.586l4.95-4.95a1 1 0 1 1 1.414 1.414l-4.95 4.95 4.95 4.95a1 1 0 0 1-1.414 1.414l-4.95-4.95-4.95 4.95a1 1 0 0 1-1.414-1.414l4.95-4.95-4.95-4.95a1 1 0 0 1 1.414-1.414l4.95 4.95z"/></svg>
            </button>
          </div>
          
          <div class="input-wrapper input-wrapper-select select-picker-group">
            <select id="pekanSelect" onchange="if(typeof handleTematikGridFilter === 'function') handleTematikGridFilter(); updatePrintOwner('tematik');">
              <option value="">Menghitung tanggal pekan...</option>
            </select>
          </div>

          <button class="btn-pdf" onclick="cetakPDF('tematik')">
            <svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6V2zm2 2v16h10V8.414L14.586 4H8zm6 1.5V9h3.5L14 5.5zM8 12h8v2H8v-2zm0 4h8v2H8v-2z"/></svg>
            Cetak PDF
          </button>
        </div>

      </div> 
    </div> 
  </div> 
  
  <div id="printHeader" style="display: none;">
    <img src="https://www.image2url.com/r2/default/images/1778032976429-fb84224a-3e08-4092-b38f-529e608a47d2.png" class="print-logo" alt="Logo Al-Wildan">
    <h2 class="print-title">JADWAL PELAJARAN</h2>
    <h3 class="print-subtitle">AL-WILDAN ISLAMIC SCHOOL 3 BSD CITY</h3>
    <div class="print-badge-box">
      <span id="printDynamicTitle">SEMUA JADWAL PELAJARAN</span>
    </div>
  </div>

  <div id="initialState"></div>
  <div id="initialStateTematik" style="display: none;"></div>

  <div id="resultsGrid" class="flex-schedule-container" style="display: none;"></div>
  <div id="resultsTematikGrid" class="flex-schedule-container" style="display: none;"></div>

  <script>
    // FUNGSI BARU: Memperbarui teks di dalam kotak badge biru cetakan
    function updatePrintOwner(tabType) {
      const printTitle = document.getElementById('printDynamicTitle');
      if (!printTitle) return;
      
      let val = "";
      if (tabType === 'umum') {
        const inputUmum = document.getElementById('searchInput');
        val = inputUmum ? inputUmum.value.trim().toUpperCase() : "";
      } else {
        const inputTematik = document.getElementById('searchTematikInput');
        val = inputTematik ? inputTematik.value.trim().toUpperCase() : "";
      }
      
      // Jika kolom pencarian tidak kosong, tampilkan namanya. Jika kosong, tampilkan default "SEMUA JADWAL PELAJARAN"
      printTitle.innerText = val ? val : "SEMUA JADWAL PELAJARAN";
    }

    function switchTab(type) {
      const btnUmum = document.getElementById('btnTabUmum');
      const btnTematik = document.getElementById('btnTabTematik');
      const ctrlUmum = document.getElementById('controlsUmum');
      const ctrlTematik = document.getElementById('controlsTematik');
      const gridUmum = document.getElementById('resultsGrid');
      const gridTematik = document.getElementById('resultsTematikGrid');
      const initUmum = document.getElementById('initialState');
      const initTematik = document.getElementById('initialStateTematik');

      if (type === 'umum') {
        if (btnUmum) btnUmum.classList.add('active');
        if (btnTematik) btnTematik.classList.remove('active');
        if (ctrlUmum) ctrlUmum.style.display = "flex";
        if (ctrlTematik) ctrlTematik.style.display = "none";
        if (gridTematik) gridTematik.style.display = "none";
        if (initTematik) initTematik.style.display = "none";
        if (gridUmum) gridUmum.style.display = "flex"; 
        
        updatePrintOwner('umum');
        
        if (typeof handleSearch === "function") {
          handleSearch(); 
        }
      } else {
        if (btnUmum) btnUmum.classList.remove('active');
        if (btnTematik) btnTematik.classList.add('active');
        if (ctrlUmum) ctrlUmum.style.display = "none";
        if (ctrlTematik) ctrlTematik.style.display = "flex";
        if (gridUmum) gridUmum.style.display = "none";
        if (initUmum) initUmum.style.display = "none";
        if (gridTematik) gridTematik.style.display = "flex"; 
        
        updatePrintOwner('tematik');
        
        if (typeof initTematikView === "function") {
          initTematikView();
        }
      }
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
